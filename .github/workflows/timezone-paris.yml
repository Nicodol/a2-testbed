name: timezone-paris
# Cron avec un fuseau horaire (fonctionnalite GitHub de mars 2026). Sert a verifier que Cronwake
# interprete bien l'heure LOCALE Europe/Paris et pas UTC, y compris autour des changements d'heure.
on:
  schedule:
    - cron: '0 8 * * *'
      timezone: Europe/Paris
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: echo "planifie a 8h heure de Paris"
