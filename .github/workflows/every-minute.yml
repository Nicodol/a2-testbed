name: every-minute
# Demande a GitHub de tourner chaque minute. GitHub bride ce genre de cron : beaucoup de creneaux
# sont sautes. Reproduit le probleme central que Cronwake surveille (runs manques, sans aucun signal).
on:
  schedule:
    - cron: '* * * * *'
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: echo "GitHub bride ce cron, beaucoup de creneaux seront manques"
