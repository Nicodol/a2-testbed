name: push-only
# N'a PAS de cron : il se declenche sur push. Sert a verifier que Cronwake IGNORE bien les workflows
# non planifies (aucun monitor ne doit apparaitre pour celui-ci) et ne compte pas ses runs.
on:
  push:
    branches: [ main ]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: echo "workflow non planifie, Cronwake doit l'ignorer"
